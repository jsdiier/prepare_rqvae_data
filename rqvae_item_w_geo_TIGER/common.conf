[hadoop]
hadoop_bin = /usr/local/hadoop-current/bin/hadoop

[hive]
hdfs_root = /user/prod_soda_trade_strategy/soda_international_trade_stg/hive/soda_international_trade_stg
table = item_recall_meta_w_geo
dt = 20260628
country_code = MX

[output]
# item_count: 需要读取的 item 条数；填 -1 表示读取该分区下的全部数据
item_count = 5000
output_dir = item_info
output_fields = item_id,sence_id,title,description,brand,shop_id,i_lng,i_lag,geohash
geohash_precision = 6

[embedding]
model_path = /home/luban/rank-ssl/chenpinyuan/MODEL/gme-Qwen2-VL-2B-Instruct
embed_dim = 1536
batch_size = 256
device = cuda
max_length = 512
item_json = item_info/MX_item_recall.item.parquet
output_parquet = item_info/item_emb.parquet
log_sample_count = 5

[rqvae_train]
# step3_train_rq_vae.sh 训练参数
data_path = ./item_info/item_emb.parquet
ckpt_dir = ./rq/rq_model
lr = 1e-3
epochs = 100
warmup_epochs = 1
eval_step = 1
sk_epsilons = 0.003 0.0 0.003
e_dim = 128
layers = 2048 1024 512 256
batch_size = 512

[sid]
# step4_get_sid.sh 使用的 RQ-VAE checkpoint 路径
ckpt_path = ./rq/rq_model/Jul-09-2026_11-47-29/best_collision_model.pth

[mem_token]
v_mem = 200
min_count = 10
